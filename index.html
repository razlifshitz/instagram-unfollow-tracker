<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unfollow tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1a1a;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    border: 1px solid #e8e8e8;
  }
  .logo {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo svg { width: 28px; height: 28px; fill: white; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 32px; }
  .login-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-btn svg { width: 20px; height: 20px; fill: white; }
  .error { margin-top: 20px; font-size: 13px; color: #d32f2f; background: #fde8e8; padding: 10px 14px; border-radius: 8px; }
  .note { margin-top: 24px; font-size: 12px; color: #999; }
  .advanced-setup { margin-top: 16px; font-size: 12px; }
  .advanced-setup a { color: #aaa; text-decoration: underline; }
  .advanced-setup a:hover { color: #666; }
  .setup-instructions { display: none; margin-top: 16px; font-size: 12px; color: #555; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px; text-align: left; line-height: 1.6; }
  .setup-instructions code { background: #eee; padding: 1px 4px; border-radius: 4px; font-family: monospace; word-break: break-all; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
    </svg>
  </div>
  <h1>Unfollow tracker</h1>
  <p>Connect your Instagram account to see who unfollowed you each time you visit.</p>
  <a class="login-btn" href="/auth/instagram">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
    </svg>
    Login with Instagram
  </a>
  <div id="error-msg" class="error" style="display:none"></div>
  <p class="note">Works with any Instagram account (personal, creator, or business).</p>
</div>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    const el = document.getElementById('error-msg');
    const raw = params.get('error');
    const knownMsgs = { access_denied: 'You denied access. Try again.' };
    el.textContent = knownMsgs[raw] || raw;
    el.style.display = 'block';
  }
</script>
</body>
</html>
